---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hermes-volsync
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: hermes
  interval: 30m
  timeout: 5m
  path: "./kubernetes/apps/selfhosted/hermes/volsync"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  dependsOn:
    - name: onepassword-store
      namespace: external-secrets
    - name: volsync
      namespace: system
  postBuild:
    substitute:
      APP: hermes
      APP_UID: "1000"
      APP_GID: "1000"
      VOLSYNC_CLAIM: hermes-data
      VOLSYNC_CAPACITY: 10Gi
      VOLSYNC_CACHE_CAPACITY: 10Gi
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &appname hermes
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *appname
  interval: 30m
  timeout: 5m
  path: "./app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: openclaw
    namespace: selfhosted
  wait: false
  dependsOn:
    - name: openclaw-source
      namespace: selfhosted
    - name: hermes-volsync
      namespace: selfhosted
    - name: onepassword-store
      namespace: external-secrets
  postBuild:
    substitute:
      APP: *appname
      HOSTNAME: hermes.piscio.net
      DASHBOARD_HOSTNAME: hermes-dashboard.piscio.net
      TIMEZONE: Europe/Rome
      APP_UID: "1000"
      APP_GID: "1000"
      VOLSYNC_CLAIM: hermes-data
      VOLSYNC_CAPACITY: 10Gi
      VOLSYNC_CACHE_CAPACITY: 10Gi
