---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        N8N_ENCRYPTION_KEY: "{{ .openclaw_n8n_encryption_key }}"
        N8N_API_KEY: '{{ .openclaw_n8n_api_key | default "" }}'
        N8N_INTERNAL_URL: "http://127.0.0.1:5678"
        ANTHROPIC_BASE_URL: "https://openrouter.ai/api"
        ANTHROPIC_AUTH_TOKEN: "{{ .openclaw_openrouter_api_key }}"
        OPENROUTER_API_KEY: "{{ .openclaw_openrouter_api_key }}"
        TAVILY_API_KEY: "{{ .openclaw_tavily_api_key }}"
        JINA_API_KEY: '{{ .openclaw_jina_api_key | default "" }}'
        TELEGRAM_BOT_TOKEN: "{{ .openclaw_telegram_bot_token }}"
        TELEGRAM_WEDDING_GROUP_ID: "{{ .openclaw_telegram_wedding_group_id }}"
        TELEGRAM_ALLOWED_USER_IDS: '{{ .openclaw_telegram_allowed_user_ids | default "" }}'
        WEKAN_URL: '{{ .openclaw_wekan_url | default "http://wekan.selfhosted.svc.cluster.local:8080" }}'
        WEKAN_USERNAME: "{{ .openclaw_wekan_username }}"
        WEKAN_PASSWORD: "{{ .openclaw_wekan_password }}"
        WEDDING_BOARD_NAME: '{{ .openclaw_wedding_board_name | default "Wedding Planning" }}'
  dataFrom:
    - extract:
        key: openclaw
      rewrite:
        - regexp:
            source: "(.*)"
            target: "openclaw_$1"
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-db
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: crunchy-pgo-secrets
    kind: ClusterSecretStore
  target:
    name: openclaw-db-secret
    template:
      type: Opaque
      data:
        # yamllint disable rule:quoted-strings
        DB_TYPE: "postgresdb"
        DB_POSTGRESDB_DATABASE: '{{ index . "dbname" }}'
        DB_POSTGRESDB_USER: '{{ index . "user" }}'
        DB_POSTGRESDB_PASSWORD: '{{ index . "password" }}'
        DB_POSTGRESDB_HOST: '{{ index . "pgbouncer-host" }}'
        DB_POSTGRESDB_PORT: '{{ index . "pgbouncer-port" }}'
        PGDATABASE: '{{ index . "dbname" }}'
        PGUSER: '{{ index . "user" }}'
        PGPASSWORD: '{{ index . "password" }}'
        PGHOST: '{{ index . "pgbouncer-host" }}'
        PGPORT: '{{ index . "pgbouncer-port" }}'
        DATABASE_URL: 'postgresql://{{ index . "user" }}:{{ index . "password" }}@{{ index . "pgbouncer-host" }}:{{ index . "pgbouncer-port" }}/{{ index . "dbname" }}'
        # yamllint enable rule:quoted-strings
  dataFrom:
    - extract:
        key: postgres-pguser-openclaw
