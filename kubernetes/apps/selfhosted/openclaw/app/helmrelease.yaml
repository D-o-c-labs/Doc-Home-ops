---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s-labs
        namespace: flux-system
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  values:
    controllers:
      openclaw:
        annotations:
          secret.reloader.stakater.com/reload: openclaw-secret,openclaw-db-secret

        pod:
          labels:
            egress.home.arpa/internet: allow
            egress.home.arpa/kubedns: allow # FIXME: Remove when clusterNetworkPolicy is in place
            egress.home.arpa/postgres-cluster: allow
            ingress.home.arpa/gateway-route: allow
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true

        initContainers:
          claude-code:
            image:
              repository: docker.io/library/node
              tag: 20-alpine
            command:
              - /bin/sh
              - -c
            args:
              - >-
                set -eu;
                TOOL_DIR=/home/node/.n8n/.openclaw-claude;
                mkdir -p "${TOOL_DIR}";
                if [ ! -x "${TOOL_DIR}/node_modules/.bin/claude" ]; then
                  npm --prefix "${TOOL_DIR}" install --no-fund --no-audit @anthropic-ai/claude-code;
                fi

        containers:
          app:
            image:
              repository: n8nio/n8n
              tag: 2.10.2@sha256:cfa50544c4cc172506834da1ec9bb5171db55958c8d1918205df0bda237a56f4
            env:
              VUE_APP_URL_BASE_API: "https://${HOSTNAME}"
              WEBHOOK_URL: "https://${HOSTNAME}"
              N8N_METRICS: "true"
              NODE_ENV: "production"
              NODE_FUNCTION_ALLOW_EXTERNAL: "cheerio"
              N8N_RUNNERS_ENABLED: true
              N8N_BLOCK_ENV_ACCESS_IN_NODE: false
              N8N_INTERNAL_URL: "http://127.0.0.1:5678"
              N8N_PUBLIC_API_DISABLED: "false"
              PATH: "/home/node/.n8n/.openclaw-claude/node_modules/.bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            envFrom:
              - secretRef:
                  name: openclaw-secret
              - secretRef:
                  name: openclaw-db-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 1024Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL

    service:
      app:
        controller: openclaw
        ports:
          http:
            port: &port 5678

    persistence:
      config:
        existingClaim: "${VOLSYNC_CLAIM}"
        advancedMounts:
          openclaw:
            app:
              - path: /home/node/.n8n
                readOnly: false
            claude-code:
              - path: /home/node/.n8n
                readOnly: false
      reference:
        type: configMap
        name: openclaw-reference
        advancedMounts:
          openclaw:
            app:
              - path: /home/node/.n8n/openclaw-reference
                readOnly: true

    route:
      app:
        hostnames:
          - ${HOSTNAME}
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: openclaw
                port: *port
