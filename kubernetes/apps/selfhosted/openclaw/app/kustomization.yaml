---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./helmrelease.yaml
  - ./networkpolicy.yaml
  - ./bootstrap-job.yaml
configMapGenerator:
  - name: openclaw-bootstrap-sql
    files:
      - ./sql/001_schema.sql
      - ./sql/002_seed.sql
  - name: openclaw-workflows
    files:
      - ./workflows/telegram-router.json
      - ./workflows/core-agent.json
      - ./workflows/wedding-planner-agent.json
      - ./workflows/mcp-client.json
      - ./workflows/mcp-builder.json
      - ./workflows/workflow-builder.json
      - ./workflows/reminder-factory.json
      - ./workflows/mcp-weather.json
      - ./workflows/mcp-wekan.json
      - ./workflows/memory-search.json
      - ./workflows/memory-save.json
  - name: openclaw-reference
    files:
      - ./reference/workflow-builder.md
generatorOptions:
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
configurations:
  - ./kustomizeconfig.yaml
