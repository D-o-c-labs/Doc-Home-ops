---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openclaw-source
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: openclaw
  interval: 30m
  timeout: 5m
  path: "./kubernetes/apps/selfhosted/openclaw/source"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  dependsOn:
    - name: onepassword-store
      namespace: external-secrets
  healthChecks:
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: GitRepository
      name: openclaw
      namespace: selfhosted
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openclaw-volsync
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: openclaw
  interval: 30m
  timeout: 5m
  path: "./kubernetes/apps/selfhosted/openclaw/volsync"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  dependsOn:
    - name: onepassword-store
      namespace: external-secrets
    - name: volsync
      namespace: system
  postBuild:
    substitute:
      APP: openclaw
      APP_UID: "1000"
      APP_GID: "1000"
      VOLSYNC_CLAIM: openclaw-home
      VOLSYNC_CAPACITY: 10Gi
      VOLSYNC_CACHE_CAPACITY: 10Gi
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &appname openclaw
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *appname
  interval: 30m
  timeout: 5m
  path: "./openclaw/app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: openclaw
    namespace: selfhosted
  wait: false
  dependsOn:
    - name: openclaw-source
      namespace: selfhosted
    - name: openclaw-volsync
      namespace: selfhosted
    - name: onepassword-store
      namespace: external-secrets
    - name: metamcp
      namespace: selfhosted
  postBuild:
    substitute:
      APP: *appname
      HOSTNAME: openclaw.piscio.net
      DASHBOARD_HOSTNAME: openclaw-dashboard.piscio.net
      APP_UID: "1000"
      APP_GID: "1000"
      VOLSYNC_CLAIM: openclaw-home
      VOLSYNC_CAPACITY: 10Gi
      VOLSYNC_CACHE_CAPACITY: 10Gi
